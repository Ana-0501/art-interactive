<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtFilter — 图像艺术处理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>ArtFilter</h1>
    <span class="sub">图像艺术处理</span>
  </header>

  <div id="upload-zone">
    <div class="upload-icon">+</div>
    <p>拖放图片到此处，或 <span>点击选择</span></p>
    <input type="file" id="file-input" accept="image/*" hidden>
  </div>

  <div id="samples-section">
    <h3>快速体验</h3>
    <div class="samples-grid" id="samples-grid"></div>
  </div>

  <div id="controls" style="display:none">
    <div class="effect-row" id="effect-buttons">
      <button data-effect="geometric" class="effect-btn">
        <span class="icon">🔷</span>几何解构
      </button>
      <button data-effect="ink" class="effect-btn">
        <span class="icon">⬛</span>黑白效果
      </button>
      <button data-effect="pixel" class="effect-btn">
        <span class="icon">👾</span>像素复古
      </button>
    </div>

    <div class="slider-row">
      <label>强度</label>
      <input type="range" id="intensity" min="1" max="100" value="50">
      <span id="intensity-val">50</span>
    </div>

    <div id="result-area">
      <div class="canvas-pair" id="canvas-pair" style="display:none">
        <div class="canvas-box">
          <span class="canvas-label">原图</span>
          <canvas id="original-canvas"></canvas>
        </div>
        <div class="canvas-box">
          <span class="canvas-label">效果</span>
          <canvas id="output-canvas"></canvas>
        </div>
      </div>
      <div id="placeholder">选择效果开始处理</div>
    </div>

    <div class="action-row">
      <button id="download-btn" disabled>⬇ 导出图片</button>
      <button id="reset-btn">↺ 重新上传</button>
    </div>
  </div>

  <script src="js/effects.js"></script>
  <script src="js/samples.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
